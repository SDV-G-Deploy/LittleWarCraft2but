name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_PEER_HOST: ${{ vars.VITE_PEER_HOST || '116.203.107.226' }}
          VITE_PEER_PORT: ${{ vars.VITE_PEER_PORT || '9000' }}
          VITE_PEER_PATH: ${{ vars.VITE_PEER_PATH || '/' }}
          VITE_PEER_SECURE: ${{ vars.VITE_PEER_SECURE || 'false' }}
          VITE_ICE_SERVERS: ${{ vars.VITE_ICE_SERVERS || '[{"urls":["stun:116.203.107.226:3478"]},{"urls":["turn:116.203.107.226:3478?transport=udp","turn:116.203.107.226:3478?transport=tcp"],"username":"lwc2","credential":"JFC3omSBnSdhbaDDGCY3bXEv8evmX3gX"}]' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
