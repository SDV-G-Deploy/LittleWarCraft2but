events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  limit_req_zone $binary_remote_addr zone=peerjs_req:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=peerjs_conn:10m;

  map $http_origin $cors_allow_origin {
    default "";
    "https://w2.kislota.today" $http_origin;
  }

  server {
    listen 80;
    server_name w2.kislota.today;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name w2.kislota.today;

    ssl_certificate /etc/letsencrypt/live/w2.kislota.today/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/w2.kislota.today/privkey.pem;

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location = /api/ice {
      proxy_pass http://ice-api:8081/api/ice;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/ice/healthz {
      proxy_pass http://ice-api:8081/healthz;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }

    # PeerJS websocket endpoint (path='/' + key='peerjs' => /peerjs)
    # Must not redirect, otherwise WS upgrade can fail after successful /peerjs/id.
    location = /peerjs {
      limit_req zone=peerjs_req burst=40 nodelay;
      limit_conn peerjs_conn 20;

      proxy_pass http://peerjs:9000/peerjs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;
      add_header Vary "Origin" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    location /peerjs/ {
      # Backward compatibility for clients built with VITE_PEER_PATH=/peerjs
      # which produce /peerjs/peerjs[...] against this reverse proxy.
      rewrite ^/peerjs/peerjs$ /peerjs break;
      rewrite ^/peerjs/peerjs/(.*)$ /peerjs/$1 break;

      limit_req zone=peerjs_req burst=40 nodelay;
      limit_conn peerjs_conn 20;

      proxy_pass http://peerjs:9000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;
      add_header Vary "Origin" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }
  }
}
