services:
  peerjs:
    image: peerjs/peerjs-server:latest
    container_name: lwc2-peerjs
    restart: unless-stopped
    command:
      - --port
      - "9000"
      - --host
      - 0.0.0.0
      - --path
      - /
      - --key
      - peerjs
      - --proxied
      - "true"
      - --concurrent_limit
      - "200"
    expose:
      - "9000"

  peerjs-https:
    image: nginx:alpine
    container_name: lwc2-peerjs-https
    restart: unless-stopped
    depends_on:
      - peerjs
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ../dist:/usr/share/nginx/html:ro

  coturn:
    image: coturn/coturn:4.6.3
    container_name: lwc2-coturn
    restart: unless-stopped
    command:
      - -n
      - --log-file=stdout
      - --use-auth-secret
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET}
      - --fingerprint
      - --realm=${TURN_REALM}
      - --server-name=${TURN_REALM}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-ip=0.0.0.0
      - --relay-ip=0.0.0.0
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/tcp"
      - "49160-49200:49160-49200/udp"

  ice-api:
    image: node:20-alpine
    container_name: lwc2-ice-api
    restart: unless-stopped
    working_dir: /app
    command: ["node", "ice-server.js"]
    environment:
      ICE_API_PORT: 8081
      ICE_ALLOWED_ORIGIN: https://w2.kislota.today
      TURN_HOST: ${TURN_REALM}
      TURN_PORT: 3478
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET}
      TURN_TTL_SECONDS: 600
    expose:
      - "8081"
    volumes:
      - ./ice-server.js:/app/ice-server.js:ro


