services:
  peerjs:
    image: peerjs/peerjs-server:latest
    container_name: lwc2-peerjs
    restart: unless-stopped
    command:
      - --port
      - "9000"
      - --host
      - 0.0.0.0
      - --path
      - /
      - --key
      - peerjs
      - --proxied
      - "true"
      - --concurrent_limit
      - "200"
    expose:
      - "9000"

  peerjs-https:
    image: nginx:alpine
    container_name: lwc2-peerjs-https
    restart: unless-stopped
    depends_on:
      - peerjs
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ../dist:/usr/share/nginx/html:ro

  coturn:
    image: coturn/coturn:4.6.3
    container_name: lwc2-coturn
    restart: unless-stopped
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --fingerprint
      - --realm=${TURN_REALM}
      - --server-name=${TURN_REALM}
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-ip=0.0.0.0
      - --relay-ip=0.0.0.0
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/tcp"
      - "49160-49200:49160-49200/udp"


